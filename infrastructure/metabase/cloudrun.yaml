# Cloud Run service spec for Metabase — Task 3.
# Rendered by deploy.sh via envsubst (or sed fallback) and applied via
# `gcloud run services replace`. Placeholders use ${VAR} syntax.
#
# Placeholders resolved by deploy.sh:
#   SERVICE_NAME              — metabase
#   PROJECT                   — iampatterson
#   IMAGE                     — metabase/metabase:<pinned-tag>
#   RUNTIME_SA_EMAIL          — metabase-runtime@iampatterson...
#   CLOUDSQL_PRIVATE_IP       — discovered at render time from the Cloud SQL
#                               instance (private IP only; no public IP).
#   DOMAIN                    — bi.iampatterson.com
#
# Every other value is pinned: sizing, scaling, timeouts, env var sources.
# Edit this file to change sizing; edit deploy.sh defaults to change
# placeholders.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  namespace: ${PROJECT}
  annotations:
    # Lock out direct .run.app access; traffic must arrive via the
    # external HTTPS load balancer (Task 5) fronted by IAP (Task 6).
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '3'
        run.googleapis.com/execution-environment: gen2
        # Direct VPC egress via the default VPC lets the Metabase container
        # reach the Cloud SQL private IP through the project's
        # google-managed-services VPC peering. No Auth Proxy sidecar —
        # Metabase's bundled pgjdbc doesn't speak the Auth Proxy's socket
        # protocol without the Cloud SQL JDBC Socket Factory (not shipped
        # in the official image), and standard TCP via private IP is
        # functionally equivalent for security (never leaves the VPC).
        # private-ranges-only keeps public-internet traffic on the default
        # Cloud Run egress path.
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/network-interfaces: '[{"network":"default","subnetwork":"default"}]'
    spec:
      serviceAccountName: ${RUNTIME_SA_EMAIL}
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
        - image: ${IMAGE}
          # Cloud Run sets PORT=8080 and Metabase honors it via Jetty;
          # declaring containerPort explicitly aligns the probe below.
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: '1'
              memory: 2Gi
          # Metabase cold starts are slow (Java + JDBC warmup).
          # Allow up to 120s before Cloud Run gives up on the container.
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          env:
            # Metabase's Jetty defaults to port 3000 and does NOT auto-read
            # Cloud Run's injected PORT env var. Without this, the startup
            # probe on 8080 never sees a listener and the container loops
            # on deployment. Keep aligned with containerPort + probe port.
            - name: MB_JETTY_PORT
              value: '8080'
            # MB_DB_TYPE is explicitly set to prevent fallback to embedded H2.
            - name: MB_DB_TYPE
              value: postgres
            # TCP to Cloud SQL private IP. Resolved by deploy.sh at
            # render time; never hardcoded in repo. Reachable only from
            # inside the VPC via google-managed-services peering.
            - name: MB_DB_HOST
              value: ${CLOUDSQL_PRIVATE_IP}
            - name: MB_DB_PORT
              value: '5432'
            - name: MB_DB_DBNAME
              value: metabase
            - name: MB_DB_USER
              value: metabase
            - name: MB_SITE_URL
              value: https://${DOMAIN}
            # JVM heap under the 2Gi container cap (leave room for
            # Metaspace, native, and Cloud Run overhead).
            - name: JAVA_TOOL_OPTIONS
              value: -Xmx1800m
            # Secrets via Secret Manager — no values in this file.
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: metabase-db-password
                  key: latest
            - name: MB_ENCRYPTION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: metabase-encryption-key
                  key: latest
